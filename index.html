<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le soluzioni semplici - California beats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0052CC 0%, #0066FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: "🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙 🤙";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            font-size: 80px;
            line-height: 1.2;
            word-wrap: break-word;
            opacity: 0.08;
            pointer-events: none;
            z-index: -1;
            white-space: pre-wrap;
            color: white;
            animation: drift 20s linear infinite;
        }
        
        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(-50%, -50%);
            }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
            padding: 60px 50px;
            max-width: 550px;
            text-align: center;
            animation: slideIn 0.7s ease-out;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .album-cover {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 82, 204, 0.3);
            overflow: hidden;
        }
        
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        h1 {
            color: #0052CC;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .album-title {
            color: #0066FF;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .release-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 2px solid #E0E8FF;
        }
        
        .info-item {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        
        .info-label {
            display: block;
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .description {
            color: #555;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-style: italic;
        }
        
        .credits {
            color: #888;
            font-size: 13px;
            margin-bottom: 32px;
            padding: 16px;
            background: #F5F7FF;
            border-radius: 12px;
            border-left: 4px solid #0066FF;
        }
        
        .credits-label {
            display: block;
            font-weight: 600;
            color: #0052CC;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #0052CC 0%, #0066FF 100%);
            color: white;
            padding: 18px 50px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0, 82, 204, 0.4);
            letter-spacing: 0.5px;
        }
        
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(0, 82, 204, 0.6);
        }
        
        .download-btn:active {
            transform: translateY(-1px);
        }
        
        .footer {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 2px solid #E0E8FF;
            color: #999;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 45px 30px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .album-title {
                font-size: 28px;
                letter-spacing: 1px;
            }
            
            .album-cover {
                width: 160px;
                height: 160px;
            }
            
            .release-info {
                flex-direction: column;
                gap: 12px;
            }
            
            .download-btn {
                padding: 16px 40px;
                font-size: 16px;
            }
            
            body::before {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="album-cover">
            <img src="copertina-disco-shrinked.jpg" alt="Album Cover - California beats">
        </div>
        
        <h1>Le soluzioni semplici</h1>
        <div class="album-title">California beats</div>
        
        <div class="release-info">
            <div class="info-item">
                <span class="info-label">Release</span>
                7 November 2025
            </div>
            <div class="info-item">
                <span class="info-label">Genre</span>
                Electronic
            </div>
        </div>
        
        <p class="description">Un disco meraviglioso che cattura l'essenza della California</p>
        
        <div class="credits">
            <span class="credits-label">Credits</span>
            pinco pallino
        </div>
        
        <a href="cd-booklet.pdf" class="download-btn" download>
            📥 Download Booklet
        </a>
        
        <div class="footer">
            Free download for all fans • No sign-up required
        </div>
    </div>
</body>
</html>
