<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le soluzioni semplici - CD Booklet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .cd-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .album-title {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .release-date {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .description {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .credits {
            color: #999;
            font-size: 13px;
            margin-bottom: 40px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 10px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }
        
        .download-btn:active {
            transform: translateY(0);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 35px 25px;
            }
            
            .album-title {
                font-size: 26px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .cd-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cd-icon">💿</div>
        <h1>Le soluzioni semplici</h1>
        <div class="album-title">California beats</div>
        <div class="release-date">7 November 2025</div>
        <p class="description">Un disco meraviglioso</p>
        <div class="credits">Credits: pinco pallino</div>
        
        <a href="BOOKLET-SOLUZIONI-compresso.pdf" class="download-btn" download>
            📥 Download Booklet
        </a>
        
        <div class="footer">
            Free download for all fans • No sign-up required
        </div>
    </div>
</body>
</html>
